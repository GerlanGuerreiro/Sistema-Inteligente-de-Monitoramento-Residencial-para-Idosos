services:

  # ========================================
  # BANCO POSTGRESQL
  # ========================================
  banco_dados:
    image: postgres:15
    container_name: banco_monitoramento
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${USUARIO_BANCO}
      POSTGRES_PASSWORD: ${SENHA_BANCO}
      POSTGRES_DB: ${NOME_BANCO}

    volumes:
      - dados_postgres:/var/lib/postgresql/data


  # ========================================
  # BROKER MQTT
  # ========================================
  broker_mqtt:
    image: eclipse-mosquitto:2
    container_name: broker_mqtt
    restart: unless-stopped

    ports:
      - "1883:1883"


  # ========================================
  # FRIGATE (CONFIGURAÇÃO PADRÃO)
  # ========================================
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: nvr_ia
    restart: unless-stopped
    privileged: true
    shm_size: "512mb"

    depends_on:
      - broker_mqtt

    ports:
      - "5000:5000"
      - "1935:1935"

    volumes:
      # CONFIGURAÇÃO COM CÂMERA REAL
      - ./frigate/config.camera.yml:/config/config.yml

      # DIRETÓRIO DE MÍDIAS
      - ./midias:/media/frigate

    env_file:
      - .env


  # ========================================
  # BACKEND FASTAPI
  # ========================================
  backend:
    build: ./backend
    container_name: api_monitoramento
    restart: unless-stopped

    depends_on:
      - banco_dados
      - broker_mqtt

    env_file:
      - .env

    ports:
      - "8000:8000"


volumes:
  dados_postgres:
